<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Escala BM</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the current path + query + hash as a query param and
      // sends the browser to the repo root so index.html loads.
      // The segment count (1) must match the number of path segments in the
      // repo name: /gestao-escalas/ → 1 segment.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
