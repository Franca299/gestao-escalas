<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escala BM – Gestão de Efetivo</title>
    <!-- GitHub Pages SPA: restore the path encoded by 404.html -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?/ encoding used by 404.html
        var l = window.location;
        if (l.search && l.search.slice(1, 2) === '/') {
          var decoded = l.search.slice(1).replace(/~and~/g, '&');
          history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded +
            (l.hash || '')
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
