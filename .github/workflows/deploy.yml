name: Deploy para GitHub Pages

on:
  push:
    branches: ["main"] # Ou "master", dependendo do nome da sua branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências e fazer Build
        run: |
          npm install
          npm run build

      - name: Upload do resultado
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Pasta que o Vite cria

      - name: Deploy
        uses: actions/deploy-pages@v4